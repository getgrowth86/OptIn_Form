<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meilenkurs 2.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '468972542963546');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=468972542963546&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 12px; }
        .form-container { max-width: 380px; margin: 0 auto; }
        .form-wrapper { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .progress-bar { height: 2px; background: #e8e8e8; border-radius: 1px; margin-bottom: 16px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff9500 0%, #ff7500 100%); width: 50%; transition: width 0.3s ease; }
        .step-title { font-size: 10px; color: #ff9500; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
        .step-heading { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 4px; }
        .step-description { font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.4; }
        .step { display: none; animation: fadeIn 0.3s ease-out; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 11px 13px; border: 2px solid #ff9500; border-radius: 10px; font-size: 14px; font-family: inherit; color: #333; }
        input::placeholder { color: #bbb; }
        input:focus, select:focus { outline: none; border-color: #ff7500; background: #fffaf7; box-shadow: 0 0 0 3px rgba(255, 149, 0, 0.12); }
        button { width: 100%; padding: 12px 18px; background: linear-gradient(135deg, #ff9500 0%, #ff7500 100%); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.4px; display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 42px; transition: all 0.2s ease; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 149, 0, 0.3); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }
        .button-group { display: flex; gap: 8px; margin-top: 12px; }
        .button-group button { flex: 1; padding: 10px 14px; font-size: 12px; min-height: 38px; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .countdown-timer { background: #fff9f5; border: 2px solid #ff9500; border-radius: 10px; padding: 11px; margin: 12px 0; font-size: 11px; color: #666; }
        .countdown-timer strong { color: #ff9500; font-size: 13px; }
        .success-screen { text-align: center; }
        .success-icon { width: 56px; height: 56px; background: #ff9500; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 28px; color: white; }
        .success-message { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #333; }
        .success-text { font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.5; }
        .info-text { font-size: 10px; color: #999; margin-top: 10px; line-height: 1.4; text-align: center; }
        .info-text strong { color: #ff9500; }
        @media (max-width: 480px) { input { font-size: 16px; } .button-group { flex-direction: column; } .button-group button { flex: 1 !important; } }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-wrapper">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

            <!-- STEP 1: EMAIL -->
            <div class="step active" id="step1">
                <div class="form-group" style="gap: 14px;">
                    <input type="email" id="email" placeholder="Deine beste E-Mail-Adresse" required>
                    <button onclick="goToStep(2)" style="font-size: 15px; padding: 14px 18px;">Jetzt kostenlos anmelden ></button>
                </div>
            </div>

            <!-- STEP 2: NAME + PHONE -->
            <div class="step" id="step2">
                <div class="step-title">Schritt 2 von 2</div>
                <h2 class="step-heading">Fast fertig!</h2>
                <p class="step-description" style="margin-bottom: 8px;">Deine Daten</p>
                <p style="font-size: 11px; color: #999; margin-bottom: 14px; font-style: italic;">Diesen Sonntag um 10:00 Uhr</p>
                <div class="form-group">
                    <input type="text" id="firstname" placeholder="Vorname" required>
                    <div style="display: flex; gap: 0; align-items: stretch;">
                        <select id="country" style="padding: 11px 8px; border: 2px solid #ff9500; border-right: none; border-radius: 10px 0 0 10px; font-size: 16px; font-weight: 600; color: #333; background: white; cursor: pointer; flex: 0 0 auto; width: 60px;">
                            <option value="DE|+49">🇩🇪</option>
                            <option value="AT|+43">🇦🇹</option>
                            <option value="CH|+41">🇨🇭</option>
                        </select>
                        <div style="padding: 11px 10px; background: #fff9f5; border: 2px solid #ff9500; border-left: none; border-right: none; font-weight: 600; color: #ff9500; font-size: 14px; display: flex; align-items: center; flex: 0 0 auto;">
                            <span id="phonePrefix">+49</span>
                        </div>
                        <input type="tel" id="phone" placeholder="123 4567890" required style="flex: 1; padding: 11px 13px; border: 2px solid #ff9500; border-left: none; border-radius: 0 10px 10px 0; font-size: 14px; font-family: inherit; color: #333;">
                    </div>
                    <div style="font-size: 10px; color: #ff9500; margin-top: 6px; line-height: 1.3;">Zugangscode kommt per SMS. Teilnahme nur mit korrekter Nummer möglich!</div>
                </div>
                <div class="form-group">
                    <div class="button-group">
                        <button class="btn-secondary" onclick="goToStep(1)">← Zurück</button>
                        <button onclick="submitForm()" style="background: linear-gradient(135deg, #ff9500 0%, #ff7500 100%); flex: 1.5;">✈️ Anmelden</button>
                    </div>
                </div>
            </div>

            <!-- SUCCESS -->
            <div class="step" id="success">
                <div class="success-screen">
                    <div class="success-icon">✓</div>
                    <div class="success-message">Glückwunsch!</div>
                    <div class="success-text">E-Mail & SMS mit Zugangslink folgen. Spam-Ordner checken!</div>
                </div>
            </div>

            <div class="info-text" id="infoText">
                Kostenlos | 100% Mehrwert | <strong>Verschlüsselt</strong>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let countdownRunning = false;

        const API_URL = window.location.origin;
        let formData = { 
            email: '', 
            country: 'DE', 
            prefix: '+49', 
            firstname: '', 
            phone: '', 
            fbclid: '', 
            fbc: '',
            utm_source: '',
            utm_medium: '',
            utm_campaign: '',
            utm_content: '',
            utm_term: '',
            referrer: '',
            lead_source: '',
            browser_fp: ''
        };

        // 🎯 Helper: SHA256 Hash (für Email/Phone)
        function hashEmail(email) {
            return CryptoJS.SHA256(email.toLowerCase().trim()).toString();
        }

        function hashPhone(phone) {
            return CryptoJS.SHA256(phone.replace(/\D/g, '')).toString();
        }

        // 🎯 Helper: Get FBC Cookie
        function getFBCookie() {
            const name = '_fbc=';
            const decodedCookie = decodeURIComponent(document.cookie);
            const cookieArray = decodedCookie.split(';');
            for (let cookie of cookieArray) {
                cookie = cookie.trim();
                if (cookie.indexOf(name) === 0) {
                    return cookie.substring(name.length);
                }
            }
            return formData.fbc;
        }

        // 🎯 Helper: Generate Browser Fingerprint
        function generateBrowserFingerprint() {
            const nav = navigator;
            const screen_info = `${window.screen.width}x${window.screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const fp = `${nav.userAgent}|${screen_info}|${timezone}`;
            return CryptoJS.SHA256(fp).toString().substring(0, 16);
        }

        // 🎯 Helper: Detect Lead Source
        function detectLeadSource(fbclid, utm_source, referrer) {
            if (fbclid || utm_source === 'facebook') return 'paid';
            if (utm_source === 'google' || referrer.includes('google.com')) return 'paid';
            if (referrer) return 'referral';
            return 'direct';
        }

        // 🎯 Init: Erfasse alle Tracking-Daten
        document.addEventListener('DOMContentLoaded', () => {
            // Extract UTM Parameters
            const urlParams = new URLSearchParams(window.location.search);
            formData.utm_source = urlParams.get('utm_source') || '';
            formData.utm_medium = urlParams.get('utm_medium') || '';
            formData.utm_campaign = urlParams.get('utm_campaign') || '';
            formData.utm_content = urlParams.get('utm_content') || '';
            formData.utm_term = urlParams.get('utm_term') || '';
            formData.fbclid = urlParams.get('fbclid') || '';
            
            // Set fbc cookie if fbclid exists
            if (formData.fbclid) {
                const fbc = `fb.1.${Date.now()}.${formData.fbclid}`;
                formData.fbc = fbc;
                document.cookie = `_fbc=${fbc}; path=/; max-age=7776000`;
                console.log('✓ fbclid & fbc set');
            }

            // Get referrer & browser fingerprint
            formData.referrer = document.referrer || '';
            formData.browser_fp = generateBrowserFingerprint();
            
            // Detect lead source
            formData.lead_source = detectLeadSource(formData.fbclid, formData.utm_source, formData.referrer);

            console.log('✓ Enterprise tracking data:', {
                utm_source: formData.utm_source,
                fbclid: !!formData.fbclid,
                lead_source: formData.lead_source,
                browser_fp: formData.browser_fp
            });

            const countrySelect = document.getElementById('country');
            const phonePrefix = document.getElementById('phonePrefix');
            
            if (countrySelect) {
                countrySelect.addEventListener('change', (e) => {
                    const [country, prefix] = e.target.value.split('|');
                    formData.country = country;
                    formData.prefix = prefix;
                    phonePrefix.textContent = prefix;
                });
            }
        });

        async function goToStep(step) {
            if (step === 2) {
                // Step 1 → 2: Email registrieren in AC
                const email = document.getElementById('email').value.trim();
                if (!email) {
                    alert('Bitte E-Mail eingeben');
                    return;
                }
                formData.email = email;
                await registerStep1();
            } else if (step === 'success') {
                // Step 2 → Success: Daten finalisieren
                const firstname = document.getElementById('firstname').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const countryValue = document.getElementById('country').value;
                
                if (!firstname || !phone) {
                    alert('Bitte alle Felder ausfüllen');
                    return;
                }
                
                // Split country value (e.g., "DE|+49" → "DE")
                const [countryCode, prefix] = countryValue.split('|');
                
                formData.firstname = firstname;
                formData.phone = phone;
                formData.country = countryCode;
                
                await submitForm();
            } else {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                currentStep = step;
                document.getElementById('step' + step).classList.add('active');
                document.getElementById('infoText').style.display = 'block';
                updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function registerStep1() {
            try {
                const response = await fetch(`${API_URL}/api/register-step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: formData.email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                    currentStep = 2;
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('infoText').style.display = 'block';
                    updateProgress();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert('Fehler: ' + (data.message || 'Anmeldung fehlgeschlagen'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Verbindungsfehler - versuche es später');
            }
        }

        async function submitForm() {
            try {
                // 🎯 COLLECT DATA FROM INPUT FIELDS FIRST!
                const firstname = document.getElementById('firstname').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const countryValue = document.getElementById('country').value;
                
                console.log('📝 submitForm() - Collecting data from inputs:');
                console.log('  firstname:', firstname);
                console.log('  phone:', phone);
                console.log('  countryValue:', countryValue);
                
                if (!firstname || !phone || !countryValue) {
                    alert('Bitte alle Felder ausfüllen');
                    return;
                }
                
                // Split country value (e.g., "DE|+49" → "DE")
                const [countryCode, prefix] = countryValue.split('|');
                
                // Update formData with collected data
                formData.firstname = firstname;
                formData.phone = phone;
                formData.country = countryCode;
                
                console.log('✓ formData updated:', {
                    email: formData.email,
                    firstname: formData.firstname,
                    phone: formData.phone,
                    country: formData.country
                });
                
                // 🎯 Vorbereitung: Gehashte Daten für Pixel
                const emailHash = hashEmail(formData.email);
                const phoneHash = hashPhone(formData.phone);
                const fbc = getFBCookie();

                console.log('📤 Sending to /api/register-complete...');
                
                const response = await fetch(`${API_URL}/api/register-complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...formData,
                        emailHash,
                        phoneHash,
                        fbc,
                        fbclid: formData.fbclid
                    })
                });
                
                const data = await response.json();
                
                console.log('📥 Response:', data);
                
                if (data.success) {
                    // 🎯 Track Lead Event in Meta Pixel (mit hashing & fbc)
                    if (typeof fbq !== 'undefined') {
                        fbq('track', 'Lead', {
                            value: 0,
                            currency: 'EUR',
                            content_name: 'Meilenkurs 2.0 Workshop',
                            content_category: 'webinar',
                            email: emailHash, // SHA256 Hash
                            phone: phoneHash, // SHA256 Hash
                            first_name: formData.firstname,
                            country: formData.country,
                            fbc: fbc // Facebook Click ID
                        });
                        console.log('✓ Meta Pixel Lead Event tracked');
                    }
                    
                    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                    document.getElementById('success').classList.add('active');
                    currentStep = 3;
                    document.getElementById('infoText').style.display = 'none';
                    updateProgress();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert('Fehler: ' + (data.message || 'Anmeldung fehlgeschlagen'));
                    console.error('Error details:', data.details);
                }
            } catch (error) {
                console.error('❌ Error:', error);
                alert('Verbindungsfehler - versuche es später');
            }
        }

        function updateProgress() {
            const progress = (currentStep / 2) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        updateProgress();
    </script>
</body>
</html>
