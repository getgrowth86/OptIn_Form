<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meilenkurs 2.0 - Anmeldung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-wrapper {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px;
            border: 2px solid #ff9500;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            color: #333;
            background: white;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff7500;
            background: #fffaf7;
            box-shadow: 0 0 0 4px rgba(255, 149, 0, 0.15);
        }

        .form-group button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #ff9500 0%, #ff7500 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 48px;
        }

        .form-group button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 149, 0, 0.3);
        }

        .form-group button:active:not(:disabled) {
            transform: translateY(0);
        }

        .form-group button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            animation: shake 0.3s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-group.error input {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .success-message {
            background: #27ae60;
            color: white;
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            animation: slideDown 0.3s ease-out;
            font-size: 14px;
            line-height: 1.5;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 14px;
            line-height: 1.6;
            text-align: center;
        }

        .info-text strong {
            color: #ff9500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-wrapper {
                padding: 20px;
                border-radius: 14px;
            }

            .form-group {
                gap: 12px;
                margin-bottom: 12px;
            }

            .form-group input {
                padding: 14px 15px;
                font-size: 16px; /* Prevents zoom on iOS */
                border-radius: 10px;
            }

            .form-group button {
                padding: 14px 20px;
                min-height: 46px;
                font-size: 14px;
                border-radius: 10px;
            }

            .info-text {
                font-size: 11px;
                margin-top: 12px;
            }
        }

        @media (max-width: 380px) {
            .form-wrapper {
                padding: 16px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 15px;
            }

            .form-group button {
                padding: 12px 16px;
                min-height: 44px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-wrapper">
            <div class="success-message" id="successMessage">
                ✓ Perfekt! Schau in deine E-Mail (auch Spam-Ordner checken!)
            </div>

            <form id="emailForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Deine beste E-Mail-Adresse" 
                        required
                        autocomplete="email"
                    >
                    <button type="submit" id="submitBtn">
                        <span id="btnText">Jetzt kostenlos anmelden</span>
                        <span class="spinner" style="display: none;" id="spinner"></span>
                    </button>
                </div>
                <div class="error-message" id="errorMessage"></div>
            </form>

            <div class="info-text">
                Völlig kostenlos | 100% Mehrwert | <strong>256-Bit Verschlüsselt</strong>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://opt-in-form.vercel.app'; // ← Anpassen auf deine Vercel URL!
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const form = document.getElementById('emailForm');
        const formGroup = form.querySelector('.form-group');

        // Clear error on input
        emailInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
            formGroup.classList.remove('error');
        });

        // Clear error on focus
        emailInput.addEventListener('focus', () => {
            errorMessage.classList.remove('show');
            formGroup.classList.remove('error');
        });

        async function submitForm(e) {
            e.preventDefault();

            const email = emailInput.value.trim();

            // Validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                errorMessage.textContent = 'Bitte gib eine gültige E-Mail-Adresse ein';
                errorMessage.classList.add('show');
                formGroup.classList.add('error');
                emailInput.focus();
                return;
            }

            // Disable form
            submitBtn.disabled = true;
            emailInput.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Wird angemeldet...';

            try {
                const response = await fetch(`${API_URL}/api/register-step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    // Success!
                    form.style.display = 'none';
                    successMessage.classList.add('show');

                    // Optional: Redirect nach 3 Sekunden
                    // setTimeout(() => {
                    //     window.location.href = 'https://deine-landing-page.com/danke';
                    // }, 3000);
                } else {
                    throw new Error(data.message || 'Anmeldung fehlgeschlagen');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = error.message || 'Verbindungsfehler. Versuche es später erneut.';
                errorMessage.classList.add('show');
                formGroup.classList.add('error');

                // Re-enable form
                submitBtn.disabled = false;
                emailInput.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Jetzt kostenlos anmelden';
                emailInput.focus();
            }
        }
    </script>
</body>
</html>
